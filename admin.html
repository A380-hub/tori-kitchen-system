<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TORI KIS — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; background: #000; font-family: 'Barlow Condensed', sans-serif; color: #fff; touch-action: manipulation; }

  #auth-screen { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #auth-screen img { width: min(200px,55vw); margin-bottom: 28px; }
  .auth-title { font-size: 22px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .auth-sub { font-family: 'Barlow', sans-serif; font-size: 13px; color: #555; margin-bottom: 28px; }

  #admin-app { display: none; max-width: 600px; margin: 0 auto; padding: 24px 16px 80px; }
  #admin-app.visible { display: block; }

  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid #1a1a1a; }
  .admin-header img { width: 120px; }
  .admin-badge { background: #cc1010; color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; }

  .section { margin-bottom: 32px; }
  .section-title { font-size: 12px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #444; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a; }

  .user-card { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .user-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; flex-shrink: 0; text-transform: uppercase; background: #333; color: #fff; }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; }
  .user-meta { font-family: 'Barlow', sans-serif; font-size: 12px; color: #555; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .group-pill { display: inline-block; font-size: 10px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 10px; }
  .group-pill.kitchen    { background: #1a3d22; color: #4caf74; }
  .group-pill.management { background: #1a2d4a; color: #5b9bd5; }
  .group-pill.delivery   { background: #3d3010; color: #d4a847; }
  .group-pill.admin      { background: #3d0a0a; color: #ff6666; }

  .user-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-icon { background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; color: #888; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; padding: 6px 10px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .btn-icon:hover { background: #222; color: #fff; }
  .btn-icon.danger:hover { background: #2a0808; border-color: #cc1010; color: #ff6666; }

  /* ── FORM ── */
  .form-card { background: #111; border: 1px solid #cc1010; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .form-title { font-size: 14px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #cc1010; margin-bottom: 16px; }
  .form-row { margin-bottom: 14px; }
  .form-label { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #555; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; padding: 10px 14px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: #cc1010; }

  /* ── ROLE CHECKBOXES ── */
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .role-check { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; padding: 10px 14px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .role-check:hover { border-color: #333; }
  .role-check.selected { border-color: #cc1010; background: #1a0808; }
  .role-check input[type=checkbox] { display: none; }
  .role-checkmark { width: 18px; height: 18px; border: 2px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .role-check.selected .role-checkmark { background: #cc1010; border-color: #cc1010; }
  .role-checkmark::after { content: '✓'; font-size: 11px; color: #fff; display: none; }
  .role-check.selected .role-checkmark::after { display: block; }
  .role-name { font-size: 13px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .role-name.kitchen    { color: #4caf74; }
  .role-name.management { color: #5b9bd5; }
  .role-name.delivery   { color: #d4a847; }
  .role-name.admin      { color: #ff6666; }

  .form-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary { flex: 1; background: #cc1010; border: none; border-radius: 8px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px; cursor: pointer; transition: background 0.15s; }
  .btn-primary:hover { background: #e01212; }
  .btn-secondary { background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; color: #888; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 20px; cursor: pointer; transition: all 0.15s; }
  .btn-secondary:hover { background: #222; color: #fff; }
  .btn-add { width: 100%; background: #111; border: 2px dashed #222; border-radius: 10px; color: #444; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; padding: 14px; cursor: pointer; transition: all 0.15s; margin-top: 4px; }
  .btn-add:hover { border-color: #cc1010; color: #cc1010; background: #1a0808; }

  /* ── PIN ── */
  .pin-dots { display: flex; gap: 14px; align-items: center; justify-content: center; margin-bottom: 24px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #333; background: transparent; transition: background 0.15s, border-color 0.15s; }
  .pin-dot.filled  { background: #cc1010; border-color: #cc1010; }
  .pin-dot.success { background: #22cc66; border-color: #22cc66; }
  .pin-dot.error   { background: #ff4444; border-color: #ff4444; }
  .pin-error-msg { font-family: 'Barlow', sans-serif; font-size: 13px; color: #ff4444; text-align: center; min-height: 18px; margin-bottom: 16px; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: min(280px,80vw); }
  .pin-key { background: #1a1a1a; border: none; border-radius: 12px; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: clamp(22px,6vw,30px); padding: 16px 0; cursor: pointer; transition: background 0.12s, transform 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .pin-key:active { background: #cc1010; transform: scale(0.93); }
  .pin-key.wide { grid-column: span 2; }
  .pin-key.del { background: #141414; font-size: clamp(13px,3vw,17px); }
  .pin-key.del:active { background: #333; }
  @keyframes loginShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .pin-pad.shake { animation: loginShake 0.4s ease; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; letter-spacing: 1px; color: #aaa; text-transform: uppercase; opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap; z-index: 200; }
  .toast.show { opacity: 1; }
  .toast.success { border-color: #22cc66; color: #22cc66; }
  .toast.error   { border-color: #ff4444; color: #ff4444; }
  .empty-state { text-align: center; color: #333; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 24px; }
  .pin-note { font-family: 'Barlow', sans-serif; font-size: 11px; color: #444; margin-top: 4px; }
</style>
</head>
<body>

<div id="auth-screen">
  <a href="https://a380-hub.github.io/tori-kitchen-system/index.html"><img id="auth-logo" alt="TORI" style="cursor:pointer;"/></a>
  <div class="auth-title">Admin Panel</div>
  <div class="auth-sub">Enter 4-digit master code</div>
  <div class="pin-dots" id="authDots">
    <div class="pin-dot" id="ad0"></div><div class="pin-dot" id="ad1"></div>
    <div class="pin-dot" id="ad2"></div><div class="pin-dot" id="ad3"></div>
  </div>
  <div class="pin-error-msg" id="authError"></div>
  <div class="pin-pad" id="authPad">
    <button class="pin-key" onclick="authPress('1')">1</button>
    <button class="pin-key" onclick="authPress('2')">2</button>
    <button class="pin-key" onclick="authPress('3')">3</button>
    <button class="pin-key" onclick="authPress('4')">4</button>
    <button class="pin-key" onclick="authPress('5')">5</button>
    <button class="pin-key" onclick="authPress('6')">6</button>
    <button class="pin-key" onclick="authPress('7')">7</button>
    <button class="pin-key" onclick="authPress('8')">8</button>
    <button class="pin-key" onclick="authPress('9')">9</button>
    <button class="pin-key wide" onclick="authPress('0')">0</button>
    <button class="pin-key del" onclick="authDelete()">⌫ DEL</button>
  </div>
</div>

<div id="admin-app">
  <div class="admin-header">
    <a href="https://a380-hub.github.io/tori-kitchen-system/index.html"><img id="admin-logo" alt="TORI" style="cursor:pointer;"/></a>
    <div class="admin-badge">Admin Panel</div>
  </div>

  <!-- Add/Edit Form -->
  <div class="form-card" id="userForm" style="display:none">
    <div class="form-title" id="formTitle">Add New User</div>
    <input type="hidden" id="editId"/>
    <div class="form-row">
      <label class="form-label">Full Name</label>
      <input class="form-input" id="fieldName" placeholder="e.g. Ana Kovač" autocomplete="off"/>
    </div>
    <div class="form-row">
      <label class="form-label">3-Digit PIN</label>
      <input class="form-input" id="fieldPin" placeholder="e.g. 142" maxlength="3" inputmode="numeric" autocomplete="off"/>
      <div class="pin-note">Each PIN must be unique across all users</div>
    </div>
    <div class="form-row">
      <label class="form-label">Roles (select one or more)</label>
      <div class="role-grid">
        <div class="role-check" id="rc-kitchen" onclick="toggleRole('kitchen')">
          <div class="role-checkmark"></div>
          <span class="role-name kitchen">Kitchen Staff</span>
        </div>
        <div class="role-check" id="rc-management" onclick="toggleRole('management')">
          <div class="role-checkmark"></div>
          <span class="role-name management">Management</span>
        </div>
        <div class="role-check" id="rc-delivery" onclick="toggleRole('delivery')">
          <div class="role-checkmark"></div>
          <span class="role-name delivery">Delivery</span>
        </div>
        <div class="role-check" id="rc-admin" onclick="toggleRole('admin')">
          <div class="role-checkmark"></div>
          <span class="role-name admin">Admin</span>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="saveUser()">Save User</button>
      <button class="btn-secondary" onclick="cancelForm()">Cancel</button>
    </div>
  </div>

  <!-- User lists by primary role -->
  <div class="section"><div class="section-title">All Users</div><div id="list-all"><div class="empty-state">Loading...</div></div></div>

  <button class="btn-add" onclick="showAddForm()">+ Add New User</button>

  <!-- Order System -->
  <div class="section" style="margin-top:32px;">
    <div class="section-title">Order System</div>
    <div style="background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:10px;">
      <div style="font-family:'Barlow',sans-serif;font-size:13px;color:#555;line-height:1.5;">Orders delivered but not yet accepted by the restaurant. Use this to manually clear them.</div>
      <div id="pending-orders-status" style="font-family:'Barlow',sans-serif;font-size:13px;color:#888;">Checking…</div>
      <button class="btn-primary" id="clear-pending-btn" onclick="clearAllPendingOrders()" style="margin-top:4px;">Clear All Pending Orders</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

  ['auth-logo','admin-logo'].forEach(id => { const el = document.getElementById(id); if(el) el.src = 'data:image/png;base64,' + LOGO_B64; });

  // ── AUTH ──
  let authPin = '', authBusy = false;
  function authPress(d) {
    if (authBusy || authPin.length >= 4) return;
    authPin += d; updateAuthDots();
    if (authPin.length === 4) setTimeout(checkAuth, 150);
  }
  function authDelete() { authPin = authPin.slice(0,-1); updateAuthDots(); document.getElementById('authError').textContent = ''; }
  function updateAuthDots(state) {
    for (let i = 0; i < 4; i++) {
      const d = document.getElementById('ad'+i);
      d.className = 'pin-dot';
      if (state) d.classList.add(state);
      else if (i < authPin.length) d.classList.add('filled');
    }
  }
  function checkAuth() {
    if (authPin === ADMIN_CODE) {
      updateAuthDots('success');
      setTimeout(() => {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('admin-app').classList.add('visible');
        loadUsers();
        checkPendingOrders();
      }, 400);
    } else {
      updateAuthDots('error'); authBusy = true;
      document.getElementById('authPad').classList.add('shake');
      document.getElementById('authError').textContent = 'Incorrect code.';
      document.getElementById('authPad').addEventListener('animationend', () => {
        document.getElementById('authPad').classList.remove('shake');
        authPin = ''; updateAuthDots(); authBusy = false;
      }, { once: true });
    }
  }

  // ── LOAD USERS ──
  async function loadUsers() {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/users?select=*&order=name', {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
      });
      renderUsers(await res.json());
    } catch(e) { showToast('Failed to load users', 'error'); }
  }

  function renderUsers(users) {
    const el = document.getElementById('list-all');
    if (!users.length) { el.innerHTML = '<div class="empty-state">No users yet — add your first user below</div>'; return; }
    el.innerHTML = users.map(u => {
      const groups = u.groups || (u.group_name ? [u.group_name] : []);
      const pills = groups.map(g => `<span class="group-pill ${g}">${ROLE_LABELS[g] || g}</span>`).join('');
      return `<div class="user-card">
        <div class="user-avatar">${u.name.charAt(0).toUpperCase()}</div>
        <div class="user-info">
          <div class="user-name">${u.name}</div>
          <div class="user-meta">${pills}<span style="margin-left:4px">PIN: ${u.pin}</span></div>
        </div>
        <div class="user-actions">
          <button class="btn-icon" onclick='editUser(${JSON.stringify(u)})'>Edit</button>
          <button class="btn-icon danger" onclick="deleteUser('${u.id}','${u.name}')">Del</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── ROLE TOGGLE ──
  let selectedRoles = [];
  function toggleRole(role) {
    const idx = selectedRoles.indexOf(role);
    if (idx === -1) selectedRoles.push(role);
    else selectedRoles.splice(idx, 1);
    updateRoleUI();
  }
  function updateRoleUI() {
    ['kitchen','management','delivery','admin'].forEach(r => {
      const el = document.getElementById('rc-' + r);
      if (selectedRoles.includes(r)) el.classList.add('selected');
      else el.classList.remove('selected');
    });
  }
  function setRoles(roles) {
    selectedRoles = [...(roles || [])];
    updateRoleUI();
  }

  // ── FORM ──
  function showAddForm() {
    document.getElementById('formTitle').textContent = 'Add New User';
    document.getElementById('editId').value = '';
    document.getElementById('fieldName').value = '';
    document.getElementById('fieldPin').value = '';
    setRoles([]);
    document.getElementById('userForm').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('fieldName').focus();
  }

  function editUser(u) {
    document.getElementById('formTitle').textContent = 'Edit User';
    document.getElementById('editId').value = u.id;
    document.getElementById('fieldName').value = u.name;
    document.getElementById('fieldPin').value = u.pin;
    const groups = u.groups || (u.group_name ? [u.group_name] : []);
    setRoles(groups);
    document.getElementById('userForm').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelForm() { document.getElementById('userForm').style.display = 'none'; }

  async function saveUser() {
    const id    = document.getElementById('editId').value;
    const name  = document.getElementById('fieldName').value.trim();
    const pin   = document.getElementById('fieldPin').value.trim();
    if (!name) { showToast('Enter a name', 'error'); return; }
    if (!/^\d{3}$/.test(pin)) { showToast('PIN must be exactly 3 digits', 'error'); return; }
    if (!selectedRoles.length) { showToast('Select at least one role', 'error'); return; }

    // Use first role as group_name for backward compat, full array in groups
    const body = JSON.stringify({ name, pin, group_name: selectedRoles[0], groups: selectedRoles });
    const headers = { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
    try {
      const res = id
        ? await fetch(SUPABASE_URL + '/rest/v1/users?id=eq.' + id, { method: 'PATCH', headers, body })
        : await fetch(SUPABASE_URL + '/rest/v1/users', { method: 'POST', headers, body });
      if (res.ok) { showToast(id ? 'User updated' : 'User added', 'success'); cancelForm(); loadUsers(); }
      else {
        const err = await res.json();
        showToast(err.code === '23505' ? 'PIN already in use — choose another' : 'Save failed', 'error');
      }
    } catch(e) { showToast('Connection error', 'error'); }
  }

  async function deleteUser(id, name) {
    if (!confirm('Delete ' + name + '? This cannot be undone.')) return;
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/users?id=eq.' + id, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_SERVICE, 'Authorization': 'Bearer ' + SUPABASE_SERVICE }
      });
      if (res.ok) { showToast('User deleted', 'success'); loadUsers(); }
      else showToast('Delete failed', 'error');
    } catch(e) { showToast('Connection error', 'error'); }
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast' + (type ? ' ' + type : ''); t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ── ORDER SYSTEM ──
  const VERCEL_API = 'https://tori-kitchen-system-tv6b.vercel.app';

  async function checkPendingOrders() {
    const statusEl = document.getElementById('pending-orders-status');
    const btn = document.getElementById('clear-pending-btn');
    if (!statusEl) return;
    try {
      const res = await fetch(VERCEL_API + '/api/orders/active', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const pending = (data.history || []).filter(h => h.status === 'delivered');
      if (pending.length === 0) {
        statusEl.textContent = '✓ No pending orders — all clear.';
        statusEl.style.color = '#22cc66';
        btn.disabled = true;
        btn.style.opacity = '0.4';
      } else {
        statusEl.textContent = pending.length + ' order' + (pending.length !== 1 ? 's' : '') + ' pending acceptance.';
        statusEl.style.color = '#d4a847';
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    } catch(e) {
      statusEl.textContent = 'Could not reach order system.';
      statusEl.style.color = '#ff4444';
    }
  }

  async function clearAllPendingOrders() {
    if (!confirm('Clear all pending delivered orders?\nThis will mark them as accepted.')) return;
    const btn = document.getElementById('clear-pending-btn');
    const statusEl = document.getElementById('pending-orders-status');
    btn.disabled = true;
    btn.textContent = 'Clearing…';
    try {
      const res = await fetch(VERCEL_API + '/api/orders/active', { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const pending = (data.history || []).filter(h => h.status === 'delivered');
      if (!pending.length) {
        showToast('No pending orders found', 'success');
        btn.textContent = 'Clear All Pending Orders';
        await checkPendingOrders();
        return;
      }
      // Get unique restaurants with delivered orders and mark each as accepted
      const restaurants = [...new Set(pending.map(o => o.restaurant))];
      let totalUpdated = 0;
      for (const restaurant of restaurants) {
        const r = await fetch(VERCEL_API + '/api/orders/accepted', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ restaurant, accepted_by: 'Admin' })
        });
        if (r.ok) {
          const result = await r.json();
          totalUpdated += result.updated || 0;
        }
      }
      showToast('Cleared ' + totalUpdated + ' order' + (totalUpdated !== 1 ? 's' : ''), 'success');
      await checkPendingOrders();
    } catch(e) {
      showToast('Error: ' + (e.message || 'unknown'), 'error');
    }
    btn.textContent = 'Clear All Pending Orders';
  }

  document.addEventListener('keydown', e => {
    if (document.getElementById('auth-screen').style.display !== 'none') {
      if (e.key >= '0' && e.key <= '9') authPress(e.key);
      else if (e.key === 'Backspace') authDelete();
    }
  });
</script>
</body>
</html>
