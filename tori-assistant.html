<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TORI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #0F1314;
  --bg2:   #1A1F22;
  --panel: #242C30;
  --panel2:#2B3236;
  --panel3:#3C3D3C;
  --line:  #3A3F42;
  --line2: #545454;
  --ink:   #FFFFFF;
  --ink2:  #E1E1E1;
  --ink3:  #BCC0C2;
  --ink4:  #7A7E80;
  --red:   #DE0000;
  --red2:  #B50000;
  --amber: #F59E0B;
  --green: #4CAF50;
  --font:  'Barlow Condensed', sans-serif;
  --body:  'Barlow', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }
body { font-family: var(--body); color: var(--ink); }

/* inline-svg icon wrapper */
.ic { display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
.ic svg { display: block; }
.spin { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* CARD — pinned to viewport with fixed + inset, works everywhere */
.card {
  position: fixed; inset: 0;
  max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column; overflow: hidden;
  border-left: 1px solid var(--line); border-right: 1px solid var(--line);
}

/* HEADER */
.card-header {
  background: var(--bg); border-bottom: 1px solid var(--line2);
  padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo { font-family: var(--font); font-size: 21px; font-weight: 900; letter-spacing: -0.04em; display: flex; align-items: center; gap: 5px; }
.logo-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.brand-sub { font-family: var(--font); font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--line2); }
.header-title { font-family: var(--font); font-size: 13px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink4); flex: 1; padding-left: 2px; }
.header-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.lang-toggle { display: flex; border: 1px solid var(--line2); }
.lang-btn {
  font-family: var(--font); font-size: 11px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 10px; background: var(--panel2); border: none; color: var(--ink4); cursor: pointer; transition: all 0.15s;
}
.lang-btn + .lang-btn { border-left: 1px solid var(--line2); }
.lang-btn.active { background: var(--red2); color: var(--ink); }
.icon-btn {
  width: 30px; height: 30px; background: var(--panel); border: 1px solid var(--line);
  color: var(--ink3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.icon-btn:hover { background: var(--panel2); color: var(--ink); }

/* CARD CONTENT */
.card-content { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }

/* EMPTY STATE */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; text-align: center; padding: 40px 28px;
}
.empty-icon { color: var(--line2); line-height: 0; }
.empty-title { font-family: var(--font); font-size: 17px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink4); }
.empty-desc { font-size: 14px; line-height: 1.65; color: var(--line2); max-width: 255px; }

/* MESSAGE VIEWPORT */
.msg-viewport {
  flex: 1; overflow-y: auto; padding: 14px 13px;
  display: flex; flex-direction: column; gap: 11px; scroll-behavior: smooth;
}
.msg-viewport::-webkit-scrollbar { width: 3px; }
.msg-viewport::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

/* SCROLL TO BOTTOM PILL */
.scroll-pill {
  position: absolute; bottom: 10px; right: 10px;
  display: flex; align-items: center; gap: 5px;
  background: var(--panel); border: 1px solid var(--line2);
  color: var(--ink3); font-family: var(--font); font-size: 11px;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 6px 11px; cursor: pointer; z-index: 10; animation: floatUp 0.2s ease;
}
@keyframes floatUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
.scroll-pill:hover { background: var(--panel2); color: var(--ink); }

/* MESSAGES */
.msg { display: flex; flex-direction: column; max-width: 88%; animation: msgIn 0.22s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.bot  { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 10px 14px; font-size: 15px; line-height: 1.55; word-break: break-word; }
.msg.user .bubble { background: var(--red2); color: var(--ink); }
.msg.bot  .bubble { background: var(--panel); color: var(--ink2); border: 1px solid var(--line); border-left: 3px solid var(--line2); }
.msg.bot.thinking .bubble { border-left-color: var(--amber); }
.msg-time { font-size: 10px; color: var(--line2); font-family: var(--body); margin-top: 3px; letter-spacing: 0.04em; }

/* TYPING DOTS */
.typing-dots { display: flex; align-items: center; gap: 4px; padding: 3px 0; }
.typing-dots span { width: 5px; height: 5px; background: var(--ink4); border-radius: 50%; animation: tdBounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tdBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* STATUS LINE */
.status-line {
  min-height: 18px; padding: 1px 14px; flex-shrink: 0;
  font-family: var(--font); font-size: 10px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--line2);
  display: flex; align-items: center; justify-content: center; transition: color 0.2s; text-align: center;
}
.status-line.recording { color: var(--red); }
.status-line.transcribing, .status-line.thinking { color: var(--amber); }
.status-line.warn { color: var(--amber); }

/* FOOTER */
.card-footer { padding: 9px 12px 13px; background: var(--bg2); border-top: 1px solid var(--line); flex-shrink: 0; position: relative; }

/* INPUT GROUP */
.input-group {
  display: flex; align-items: flex-end; gap: 5px;
  background: var(--panel); border: 1px solid var(--line);
  border-left: 3px solid var(--line); padding: 7px; transition: border-left-color 0.15s;
}
.input-group.active { border-left-color: var(--red2); }
.text-input {
  flex: 1; background: transparent; border: none; color: var(--ink);
  font-family: var(--body); font-size: 15px; line-height: 1.5;
  resize: none; outline: none; min-height: 24px; max-height: 80px;
  overflow-y: auto; padding: 0 4px; align-self: center;
}
.text-input::placeholder { color: var(--line2); }
.input-btn {
  width: 33px; height: 33px; flex-shrink: 0; background: var(--panel2); border: 1px solid var(--line);
  color: var(--ink3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.input-btn:hover { background: var(--panel3); color: var(--ink); }
.input-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn:not(:disabled) { background: var(--red2); border-color: var(--red2); color: var(--ink); }
.send-btn:not(:disabled):hover { background: var(--red); border-color: var(--red); }
.mic-btn.recording { background: rgba(222,0,0,0.1); border-color: var(--red); color: var(--red); animation: micPulse 1s ease-in-out infinite; }
.mic-btn.loading { border-color: var(--amber); color: var(--amber); }
@keyframes micPulse { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 5px rgba(222,0,0,0.12)} }

/* DROPDOWN */
.dropdown { position: relative; }
.dropdown-menu {
  position: absolute; bottom: calc(100% + 6px); left: 0;
  background: var(--panel); border: 1px solid var(--line2);
  min-width: 210px; z-index: 200; display: none; flex-direction: column;
}
.dropdown-menu.open { display: flex; }
.dropdown-menu button {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 14px; background: none; border: none;
  color: var(--ink3); font-family: var(--body); font-size: 14px;
  cursor: pointer; text-align: left; width: 100%; transition: background 0.1s;
}
.dropdown-menu button:hover { background: var(--panel2); color: var(--ink); }
.dropdown-sep { height: 1px; background: var(--line); margin: 4px 0; }
</style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="card-header">
    <div class="brand">
      <div class="logo">TORI <div class="logo-dot"></div></div>
      <div class="brand-sub">Assistant</div>
    </div>
    <div class="header-title">New Chat</div>
    <div class="header-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        id="btn-tl" onclick="setLang('tl')">TL</button>
      </div>
      <button class="icon-btn" id="reset-btn" title="Reset conversation" onclick="resetChat()" aria-label="Reset conversation">
        <span class="ic" data-icon="refresh" data-size="18"></span>
      </button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="card-content">

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon" data-icon="chatbot" data-size="52" data-stroke="1"></div>
      <div class="empty-title">Ask how to use TORI KIS</div>
      <div class="empty-desc">
        Tap the mic or type your question below.<br>
        Ask in English or Filipino.
      </div>
    </div>

    <!-- Messages -->
    <div class="msg-viewport" id="msg-viewport" style="display:none" role="log" aria-live="polite" aria-relevant="additions">
      <div id="msg-list"></div>
    </div>

    <!-- Scroll to bottom -->
    <button class="scroll-pill" id="scroll-pill" style="display:none" onclick="scrollToBottom()" aria-label="Scroll to latest message">
      <span class="ic" data-icon="arrowDown" data-size="14"></span> Latest
    </button>

  </div>

  <!-- STATUS -->
  <div class="status-line" id="status-line"></div>

  <!-- FOOTER -->
  <div class="card-footer">
    <div class="input-group" id="input-group">

      <!-- + Dropdown -->
      <div class="dropdown" id="dropdown">
        <button class="input-btn" onclick="toggleDropdown()" aria-label="More options" aria-haspopup="true">
          <span class="ic" data-icon="plus" data-size="18"></span>
        </button>
        <div class="dropdown-menu" id="dropdown-menu" role="menu">
          <button onclick="clearChat()" role="menuitem">
            <span class="ic" data-icon="trash" data-size="16"></span> Clear conversation
          </button>
          <div class="dropdown-sep"></div>
          <button onclick="setLang('en')" role="menuitem">
            <span class="ic" data-icon="language" data-size="16"></span> English (EN)
          </button>
          <button onclick="setLang('tl')" role="menuitem">
            <span class="ic" data-icon="language" data-size="16"></span> Filipino (TL)
          </button>
        </div>
      </div>

      <!-- Text area -->
      <textarea class="text-input" id="text-input" rows="1"
        placeholder="Type a question…"
        oninput="autoResize(this); syncState()"
        onfocus="document.getElementById('input-group').classList.add('active')"
        onblur="syncState()"
        onkeydown="handleKey(event)"></textarea>

      <!-- Mic -->
      <button class="input-btn mic-btn" id="mic-btn" onclick="toggleMic()" aria-label="Record voice">
        <span class="ic" id="mic-ic" data-icon="mic" data-size="18"></span>
      </button>

      <!-- Send -->
      <button class="input-btn send-btn" id="send-btn" onclick="sendQuestion()" disabled aria-label="Send">
        <span class="ic" data-icon="arrowUp" data-size="18"></span>
      </button>

    </div>
  </div>

</div>

<script>
/* ═══════════════ INLINE ICONS (Tabler outline paths) ═══════════════ */
const ICONS = {
  refresh:   '<path d="M20 11a8.1 8.1 0 0 0 -15.5 -2m-.5 -4v4h4"/><path d="M4 13a8.1 8.1 0 0 0 15.5 2m.5 4v-4h-4"/>',
  arrowDown: '<path d="M12 5l0 14"/><path d="M18 13l-6 6"/><path d="M6 13l6 6"/>',
  arrowUp:   '<path d="M12 5l0 14"/><path d="M18 11l-6 -6"/><path d="M6 11l6 -6"/>',
  plus:      '<path d="M12 5l0 14"/><path d="M5 12l14 0"/>',
  trash:     '<path d="M4 7l16 0"/><path d="M10 11l0 6"/><path d="M14 11l0 6"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/>',
  language:  '<path d="M4 5h7"/><path d="M9 3v2c0 4.418 -2.239 8 -5 8"/><path d="M5 9c0 2.144 2.952 3.908 6.7 4"/><path d="M12 20l4 -9l4 9"/><path d="M19.1 18h-6.2"/>',
  mic:       '<path d="M9 2m0 3a3 3 0 0 1 3 -3h0a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3h0a3 3 0 0 1 -3 -3z"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M8 21l8 0"/><path d="M12 17l0 4"/>',
  stop:      '<rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor" stroke="none"/>',
  loader:    '<path d="M12 3a9 9 0 1 0 9 9"/>',
  chatbot:   '<path d="M18 4a3 3 0 0 1 3 3v8a3 3 0 0 1 -3 3h-5l-5 3v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12"/><path d="M9.5 9h.01"/><path d="M14.5 9h.01"/><path d="M9.5 13a3.5 3.5 0 0 0 5 0"/>',
};
function svgMarkup(name, size, stroke) {
  return '<svg xmlns="http://www.w3.org/2000/svg" width="' + size + '" height="' + size +
    '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="' + (stroke || 2) +
    '" stroke-linecap="round" stroke-linejoin="round">' + (ICONS[name] || '') + '</svg>';
}
function renderIcons(root) {
  (root || document).querySelectorAll('[data-icon]').forEach(el => {
    el.classList.add('ic');
    el.innerHTML = svgMarkup(el.dataset.icon, parseInt(el.dataset.size) || 18, parseInt(el.dataset.stroke) || 2);
  });
}
function setIcon(el, name, spin) {
  if (!el) return;
  el.innerHTML = svgMarkup(name, parseInt(el.dataset.size) || 18, parseInt(el.dataset.stroke) || 2);
  el.classList.toggle('spin', !!spin);
}
renderIcons();

/* ═══════════════ STATE ═══════════════ */
let currentLang   = 'en';
let autoScrollOn  = true;
let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;
let timerInt      = null;
let recSecs       = 0;
/* silence detection */
let audioCtx = null, analyser = null, levelRAF = null, maxLevel = 0, silenceCheckOn = false, recStartMs = 0;

/* ═══════════════ DOM ═══════════════ */
const viewport  = document.getElementById('msg-viewport');
const msgList   = document.getElementById('msg-list');
const emptyEl   = document.getElementById('empty-state');
const pillEl    = document.getElementById('scroll-pill');
const textInput = document.getElementById('text-input');
const sendBtn   = document.getElementById('send-btn');
const micBtn    = document.getElementById('mic-btn');
const micIc     = document.getElementById('mic-ic');
const statusEl  = document.getElementById('status-line');
const inputGrp  = document.getElementById('input-group');

/* ═══════════════ AUTO-SCROLL ═══════════════ */
viewport.addEventListener('scroll', () => {
  const atBottom = viewport.scrollHeight - viewport.scrollTop - viewport.clientHeight < 60;
  autoScrollOn = atBottom;
  pillEl.style.display = atBottom ? 'none' : 'flex';
});
function scrollToBottom() {
  viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
  autoScrollOn = true; pillEl.style.display = 'none';
}
function maybeScroll() {
  if (autoScrollOn) requestAnimationFrame(() => viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' }));
}

/* ═══════════════ MESSAGES ═══════════════ */
function showChat() { emptyEl.style.display = 'none'; viewport.style.display = 'flex'; }

function addMsg(role, text) {
  showChat();
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (role === 'bot') {
    bubble.innerHTML = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
      .replace(/\n/g,'<br>');
  } else {
    bubble.textContent = text;
  }
  wrap.appendChild(bubble);
  const ts = document.createElement('div');
  ts.className = 'msg-time';
  ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  wrap.appendChild(ts);
  msgList.appendChild(wrap);
  maybeScroll();
  return wrap;
}

function addTyping() {
  showChat();
  const wrap = document.createElement('div');
  wrap.className = 'msg bot thinking';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  wrap.appendChild(b);
  msgList.appendChild(wrap);
  maybeScroll();
  return wrap;
}

/* ═══════════════ LANGUAGE ═══════════════ */
function setLang(code) {
  currentLang = code;
  document.getElementById('btn-en').classList.toggle('active', code === 'en');
  document.getElementById('btn-tl').classList.toggle('active', code === 'tl');
  textInput.placeholder = code === 'tl' ? 'Mag-type ng tanong…' : 'Type a question…';
  closeDropdown();
}

/* ═══════════════ DROPDOWN ═══════════════ */
function toggleDropdown() { document.getElementById('dropdown-menu').classList.toggle('open'); }
function closeDropdown()  { document.getElementById('dropdown-menu').classList.remove('open'); }
document.addEventListener('click', (e) => { if (!e.target.closest('#dropdown')) closeDropdown(); });

/* ═══════════════ RESET ═══════════════ */
function resetChat() {
  msgList.innerHTML = '';
  viewport.style.display = 'none';
  emptyEl.style.display = 'flex';
  autoScrollOn = true; pillEl.style.display = 'none';
  setStatus('', '');
}
function clearChat() { resetChat(); closeDropdown(); }

/* ═══════════════ STATUS ═══════════════ */
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status-line' + (cls ? ' ' + cls : '');
}

/* ═══════════════ INPUT HELPERS ═══════════════ */
function syncState() {
  const has = !!textInput.value.trim();
  sendBtn.disabled = !has;
  if (!has && document.activeElement !== textInput) inputGrp.classList.remove('active');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendQuestion(); }
}

/* ═══════════════ SEND ═══════════════ */
async function sendQuestion() {
  const q = textInput.value.trim();
  if (!q) return;
  textInput.value = '';
  autoResize(textInput);
  inputGrp.classList.remove('active');
  sendBtn.disabled = true;

  addMsg('user', q);
  const thinking = addTyping();
  setStatus(currentLang === 'tl' ? 'Nag-iisip…' : 'Thinking…', 'thinking');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || 'Error ' + res.status);
    const data = await res.json();
    thinking.remove();
    addMsg('bot', data.answer);
    setStatus('', '');
  } catch (err) {
    thinking.remove();
    addMsg('bot', 'Something went wrong: ' + err.message);
    setStatus('', '');
  }
}

/* ═══════════════ MIC / MEDIARECORDER ═══════════════ */
function getSupportedMime() {
  const types = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/mpeg','audio/ogg;codecs=opus'];
  for (const t of types) if (window.MediaRecorder && MediaRecorder.isTypeSupported(t)) return t;
  return '';
}

function cleanupAudioMeter() {
  if (levelRAF) { cancelAnimationFrame(levelRAF); levelRAF = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
  analyser = null;
}

async function toggleMic() {
  if (isRecording) { stopRecording(); return; }
  if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
    setStatus('Microphone not supported on this browser', 'warn'); return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false,
    });

    const mime = getSupportedMime();
    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
    audioChunks = [];
    maxLevel = 0;
    silenceCheckOn = false;

    /* live level meter → detect a dead/muted mic so we never send silence to Whisper */
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const src = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      src.connect(analyser);
      const buf = new Uint8Array(analyser.fftSize);
      const sample = () => {
        analyser.getByteTimeDomainData(buf);
        let peak = 0;
        for (let i = 0; i < buf.length; i++) { const d = Math.abs(buf[i] - 128); if (d > peak) peak = d; }
        if (peak > maxLevel) maxLevel = peak;
        levelRAF = requestAnimationFrame(sample);
      };
      sample();
      silenceCheckOn = true;
    } catch (e) { silenceCheckOn = false; }

    mediaRecorder.ondataavailable = (e) => { if (e.data?.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;

    mediaRecorder.start(); /* no timeslice → one clean complete blob on stop */
    isRecording = true; recSecs = 0; recStartMs = Date.now();
    micBtn.classList.add('recording');
    setIcon(micIc, 'stop');
    timerInt = setInterval(() => {
      recSecs++;
      const m = String(Math.floor(recSecs/60)).padStart(2,'0'), s = String(recSecs%60).padStart(2,'0');
      setStatus('● Recording  ' + m + ':' + s, 'recording');
    }, 1000);
    setStatus('● Recording…  tap mic to stop', 'recording');

  } catch (err) {
    cleanupAudioMeter();
    setStatus(err && err.name === 'NotAllowedError' ? 'Microphone permission denied' : 'Could not start microphone', 'warn');
  }
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  mediaRecorder.stop(); /* fires ondataavailable then onstop */
  isRecording = false;
  clearInterval(timerInt); timerInt = null;
  micBtn.classList.remove('recording');
  setStatus('Processing…', 'transcribing');
}

async function onRecordingStop() {
  const stream = mediaRecorder.stream;
  if (stream) stream.getTracks().forEach(t => t.stop());

  const peak  = maxLevel;
  const hadMeter = silenceCheckOn;
  const durMs = Date.now() - recStartMs;
  cleanupAudioMeter();
  resetMicUI();

  if (durMs < 500) {
    setStatus(currentLang === 'tl' ? 'Masyadong maikli — hawakan nang matagal' : 'Too short — hold the mic and speak', 'warn');
    return;
  }
  if (hadMeter && peak < 6) {
    setStatus(currentLang === 'tl' ? 'Walang tunog — i-check ang mic (naka-mute?)' : 'No sound detected — check your mic isn’t muted', 'warn');
    return;
  }
  if (!audioChunks.length) { setStatus('No audio captured — try again', 'warn'); return; }

  const type = mediaRecorder.mimeType || 'audio/webm';
  micBtn.classList.add('loading');
  setIcon(micIc, 'loader', true);
  setStatus('Transcribing…', 'transcribing');
  await transcribeBlob(new Blob(audioChunks, { type }), type);
}

function resetMicUI() {
  micBtn.classList.remove('recording', 'loading');
  setIcon(micIc, 'mic');
}

/* ═══════════════ TRANSCRIBE (Whisper) ═══════════════ */
async function transcribeBlob(blob, mime) {
  const ext = mime.includes('mp4') ? 'mp4' : mime.includes('mpeg') ? 'mp3' : mime.includes('ogg') ? 'ogg' : 'webm';
  const fd  = new FormData();
  fd.append('audio', blob, 'rec.' + ext);
  fd.append('language', currentLang);
  try {
    const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
    if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || 'Error ' + res.status);
    const { transcript } = await res.json();
    resetMicUI();
    const clean = (transcript || '').trim();
    if (clean) {
      textInput.value = clean;
      autoResize(textInput); syncState();
      inputGrp.classList.add('active');
      textInput.focus();
      setStatus('', '');
    } else {
      setStatus(currentLang === 'tl' ? 'Walang narinig — subukan ulit' : 'Nothing heard — try again', 'warn');
    }
  } catch (err) {
    resetMicUI();
    setStatus('Transcription failed: ' + err.message, 'warn');
  }
}
</script>
