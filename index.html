<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Tori Street Food — KIS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #0a0a0a; font-family: 'Barlow Condensed', sans-serif; overflow: hidden; touch-action: manipulation; }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    transition: opacity 0.4s ease;
  }
  #splash img { width: min(280px, 70vw); height: auto; }
  #splash .splash-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.25em; text-transform: uppercase; color: #444;
  }
  #splash.hide { opacity: 0; pointer-events: none; }

  /* ── PIN LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0; z-index: 900;
    background: #0a0a0a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #login-screen.visible { opacity: 1; pointer-events: all; }

  .login-logo { margin-bottom: 32px; }
  .login-logo img { width: min(200px, 55vw); height: auto; display: block; }

  .login-title {
    font-size: clamp(18px, 5vw, 26px); font-weight: 900;
    color: #fff; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 6px; text-align: center;
  }
  .login-sub {
    font-family: 'Barlow', sans-serif;
    font-size: 13px; color: #555; margin-bottom: 28px; text-align: center;
  }

  .pin-dots {
    display: flex; gap: 14px; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .pin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #333; background: transparent;
    transition: background 0.15s, border-color 0.15s;
  }
  .pin-dot.filled { background: #cc1010; border-color: #cc1010; }
  .pin-dot.success { background: #22cc66; border-color: #22cc66; }
  .pin-dot.error { background: #ff4444; border-color: #ff4444; }

  .pin-error-msg {
    font-family: 'Barlow', sans-serif; font-size: 13px;
    color: #ff4444; text-align: center; min-height: 18px; margin-bottom: 16px;
  }

  .pin-pad {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; width: min(280px, 80vw);
  }
  .pin-key {
    background: #1a1a1a; border: none; border-radius: 12px;
    color: #fff; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: clamp(22px, 6vw, 30px);
    padding: 16px 0; cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .pin-key:active { background: #cc1010; transform: scale(0.93); }
  .pin-key.wide { grid-column: span 2; }
  .pin-key.del { background: #141414; font-size: clamp(13px, 3vw, 17px); }
  .pin-key.del:active { background: #333; transform: scale(0.93); }

  @keyframes loginShake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .pin-pad.shake { animation: loginShake 0.4s ease; }

  /* ── MAIN APP ── */
  #app {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    overflow: auto;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #app.visible { opacity: 1; pointer-events: all; }

  .app-inner {
    width: min(440px, 92vw);
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(10px, 2.5vh, 22px);
    padding: clamp(12px, 2.5vh, 28px) 0;
    margin: auto;
  }

  /* user chip */
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: #161616; border: 1px solid #222;
    border-radius: 20px; padding: 6px 14px 6px 10px;
    cursor: pointer; transition: border-color 0.15s;
    align-self: flex-end;
  }
  .user-chip:hover { border-color: #cc1010; }
  .user-chip-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #22cc66;
  }
  .user-chip-name {
    font-size: 13px; font-weight: 700; color: #aaa;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .user-chip-logout {
    font-size: 11px; color: #444; margin-left: 4px;
  }

  .logo-wrap { display: flex; align-items: center; user-select: none; }
  .logo-img { width: min(260px, 66vw); height: auto; display: block; }

  .menu-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 2.5vw, 18px); width: 100%;
  }

  .tile {
    position: relative; background: #111111;
    border: 2px solid #cc1010;
    border-radius: clamp(10px, 2.5vw, 18px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(8px, 2vw, 14px);
    padding: clamp(18px, 4.5vw, 34px) clamp(10px, 2vw, 18px) clamp(14px, 3.5vw, 26px);
    cursor: pointer; text-decoration: none;
    transition: background 0.18s, border-color 0.18s, transform 0.12s, box-shadow 0.18s;
    aspect-ratio: 1 / 1;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tile:hover { background: #1c0606; border-color: #ff2020; box-shadow: 0 0 0 1px #ff202044, 0 8px 28px #cc101033; transform: translateY(-2px) scale(1.02); }
  .tile:active { transform: scale(0.97); background: #2a0808; }
  .tile.locked { opacity: 0.5; cursor: not-allowed; }
  .tile.locked:hover { transform: none; box-shadow: none; background: #111; border-color: #cc1010; }
  .tile.locked:active { transform: none; }

  .lock-badge {
    position: absolute;
    top: clamp(8px, 1.8vw, 13px); right: clamp(8px, 1.8vw, 13px);
  }
  .lock-badge svg { width: clamp(16px, 3.5vw, 24px); height: auto; }

  .tile-icon { display: flex; align-items: center; justify-content: center; }
  .tile-icon svg { width: clamp(44px, 11vw, 80px); height: auto; }

  .tile-label {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
    font-size: clamp(12px, 3vw, 20px); color: #ffffff;
    letter-spacing: 1px; text-align: center;
    line-height: 1.15; text-transform: uppercase;
  }

  /* locked toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1e1e1e; border: 1px solid #333; border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
    font-weight: 700; letter-spacing: 1px; color: #888;
    text-transform: uppercase;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    white-space: nowrap; z-index: 50;
  }
  .toast.show { opacity: 1; }

  @keyframes ripple {
    0% { box-shadow: 0 0 0 0 #ff202088; }
    100% { box-shadow: 0 0 0 18px #ff202000; }
  }
  .tile.flash { animation: ripple 0.35s ease-out; }
</style>
</head>

    delivery: 'https://a380-hub.github.io/tori-kitchen-system/tori-dispatch-delivery.html'
  };

  // Group → which modules they can access
  const GROUP_ACCESS = {
    kitchen:    ['order'],
    management: ['order', 'prep', 'delivery'],
    delivery:   ['delivery'],
    admin:      ['order', 'display', 'prep', 'delivery']
  };

  // ── STATE ──
  let currentUser = null;
  let loginPin = '';
  let loginBusy = false;

  // ── SPLASH ──
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('login-screen').classList.add('visible');
    }, 400);
  }, 1400);

  // ── LOGIN ──
  function loginPress(d) {
    if (loginBusy || loginPin.length >= 3) return;
    loginPin += d;
    updateLoginDots();
    document.getElementById('loginError').textContent = '';
    if (loginPin.length === 3) setTimeout(checkLoginPin, 150);
  }

  function loginDelete() {
    if (loginBusy) return;
    loginPin = loginPin.slice(0, -1);
    updateLoginDots();
    document.getElementById('loginError').textContent = '';
  }

  function updateLoginDots(state) {
    for (let i = 0; i < 3; i++) {
      const d = document.getElementById('ld' + i);
      d.className = 'pin-dot';
      if (state) d.classList.add(state);
      else if (i < loginPin.length) d.classList.add('filled');
    }
  }

  async function checkLoginPin() {
    loginBusy = true;
    try {
      const res = await fetch(
        SUPABASE_URL + '/rest/v1/users?pin=eq.' + loginPin + '&select=*',
        { headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON } }
      );
      const data = await res.json();
      if (data && data.length > 0) {
        currentUser = data[0];
        updateLoginDots('success');
        setTimeout(() => {
          document.getElementById('login-screen').classList.remove('visible');
          showApp();
        }, 500);
      } else {
        updateLoginDots('error');
        document.getElementById('loginPad').classList.add('shake');
        document.getElementById('loginError').textContent = 'Incorrect PIN. Try again.';
        document.getElementById('loginPad').addEventListener('animationend', () => {
          document.getElementById('loginPad').classList.remove('shake');
          loginPin = '';
          updateLoginDots();
          loginBusy = false;
        }, { once: true });
      }
    } catch(e) {
      document.getElementById('loginError').textContent = 'Connection error. Check internet.';
      loginPin = '';
      updateLoginDots();
      loginBusy = false;
    }
  }

  // ── SHOW APP ──
  function showApp() {
    document.getElementById('app').classList.add('visible');
    document.getElementById('userName').textContent = currentUser.name;
    const access = GROUP_ACCESS[currentUser.group_name] || [];
    ['order','display','prep','delivery'].forEach(mod => {
      const tile = document.getElementById('tile-' + mod);
      const lock = document.getElementById('lock-' + mod);
      if (access.includes(mod)) {
        tile.classList.remove('locked');
        lock.style.display = 'none';
      } else {
        tile.classList.add('locked');
        lock.style.display = 'block';
      }
    });
  }

  // ── OPEN MODULE ──
  function openModule(mod) {
    const access = GROUP_ACCESS[currentUser ? currentUser.group_name : ''] || [];
    if (!access.includes(mod)) {
      showToast('Access denied for your role');
      return;
    }
    window.location.href = MODULE_URLS[mod];
  }

  // ── LOGOUT ──
  function logout() {
    currentUser = null;
    loginPin = '';
    updateLoginDots();
    document.getElementById('loginError').textContent = '';
    document.getElementById('app').classList.remove('visible');
    document.getElementById('login-screen').classList.add('visible');
    loginBusy = false;
  }

  // ── TOAST ──
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', e => {
    if (document.getElementById('login-screen').classList.contains('visible')) {
      if (e.key >= '0' && e.key <= '9') loginPress(e.key);
      else if (e.key === 'Backspace') loginDelete();
    }
  });
</script>
</body>
</html>
